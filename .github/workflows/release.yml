name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf pyqt6

      - name: Run tests
        run: |
          python -m unittest discover

  build:
    name: Build Executable
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: BSN_Redactor_Linux
          - os: windows-latest
            artifact_name: BSN_Redactor_Windows.exe
          - os: macos-latest
            artifact_name: BSN_Redactor_Mac

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf pyqt6 pyinstaller

      - name: Build executable
        run: |
          python build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download all artifacts individually
        run: |
          mkdir -p release_assets
          # Download each artifact from the laest build
          # This part is tricky because upload-artifact@v4 stores
          # artifacts in a different way. We's use a softprops/action-gh-release
          # to upload the laest artifacts.

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.app
            artifacts/**/BSN_Redactor
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
